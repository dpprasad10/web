<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Course Materials · Competitive Programming Portal</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
/* ── Unit section ───────────────────────────────────────────────────────── */
.unit-section { margin-bottom: 48px; }

.unit-banner {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  background: var(--bg-raised);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  border-bottom: 3px solid var(--ac);
  cursor: pointer;
  user-select: none;
}
.unit-banner:hover { background: var(--bg-overlay); }
.unit-num-badge {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--ac);
  background: var(--ac-bg);
  width: 46px; height: 46px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.unit-banner-text h2 {
  font-size: 1.2rem;
  color: var(--text);
  margin-bottom: 2px;
}
.unit-banner-text p { font-size: 0.82rem; color: var(--text-dim); }
.unit-toggle-icon {
  margin-left: auto;
  color: var(--text-faint);
  transition: transform 280ms ease;
  flex-shrink: 0;
}
.unit-section.open .unit-toggle-icon { transform: rotate(180deg); }

/* ── Unit body: collapsible ─────────────────────────────────────────────── */
.unit-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 400ms cubic-bezier(0.4,0,0.2,1);
  background: var(--bg-raised);
  border: 1px solid var(--panel-border);
  border-top: none;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}
.unit-section.open .unit-body { max-height: 8000px; }
.unit-body-inner { padding: 24px; }

/* ── Group heading ──────────────────────────────────────────────────────── */
.group-heading {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  padding-bottom: 8px;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--panel-border-soft);
  margin-top: 24px;
}
.group-heading:first-child { margin-top: 0; }

/* ── Topic card ─────────────────────────────────────────────────────────── */
.topic-card {
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
  overflow: hidden;
  background: var(--panel);
  transition: border-color 180ms ease, box-shadow 180ms ease;
}
.topic-card:hover { border-color: var(--text-faint); }

.topic-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
}
.topic-header:hover { background: var(--bg-overlay); }

.topic-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--info-bg);
  color: var(--info);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem;
  flex-shrink: 0;
}
.topic-name-wrap { flex: 1; min-width: 0; }
.topic-name-wrap h4 {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}
.topic-complexity {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-faint);
  background: var(--bg-overlay);
  padding: 2px 7px;
  border-radius: 4px;
}
.topic-resource-pills { display: flex; gap: 4px; flex-wrap: wrap; }
.pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 180ms ease;
  font-family: var(--font-body);
}
.pill-notes   { background: var(--info-bg); color: var(--info); border-color: var(--info); }
.pill-ppt     { background: rgba(239,68,68,.10); color: #DC2626; border-color: #DC2626; }
.pill-video   { background: rgba(239,68,68,.10); color: #B91C1C; border-color: #B91C1C; }
.pill-code    { background: var(--ac-bg); color: var(--ac); border-color: var(--ac); }
.pill-example { background: var(--pending-bg); color: var(--pending); border-color: var(--pending); }
.pill:hover   { opacity: 0.8; transform: translateY(-1px); }

.topic-expand-btn {
  color: var(--text-faint);
  font-size: 0.85rem;
  transition: transform 280ms ease;
  flex-shrink: 0;
}
.topic-card.open .topic-expand-btn { transform: rotate(180deg); }

/* ── Topic detail panel ─────────────────────────────────────────────────── */
.topic-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 350ms cubic-bezier(0.4,0,0.2,1);
  border-top: 1px solid var(--panel-border-soft);
}
.topic-card.open .topic-detail { max-height: 1200px; }
.topic-detail-inner { padding: 20px; }

.topic-description {
  font-size: 0.9rem;
  color: var(--text-dim);
  margin-bottom: 18px;
  line-height: 1.65;
}

/* ── Resource action buttons in detail ─────────────────────────────────── */
.resource-action-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

/* ── Example box ────────────────────────────────────────────────────────── */
.example-box {
  background: var(--bg-overlay);
  border: 1px solid var(--panel-border-soft);
  border-radius: var(--radius-md);
  padding: 0;
  overflow: hidden;
}
.example-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--pending-bg);
  border-bottom: 1px solid var(--panel-border-soft);
}
.example-header h5 {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--pending);
  display: flex;
  align-items: center;
  gap: 8px;
}
.example-body { padding: 16px; }
.example-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.example-cell {
  background: var(--bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.example-cell-label {
  font-family: var(--font-mono);
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-faint);
  margin-bottom: 5px;
}
.example-cell-value {
  font-size: 0.85rem;
  color: var(--text);
  font-family: var(--font-mono);
}
.example-explanation {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 14px;
  line-height: 1.6;
}
.example-code-block {
  background: var(--bg-raised);
  border: 1px solid var(--panel-border);
  border-left: 3px solid var(--ac);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  overflow-x: auto;
}
.example-code-block pre {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text);
  white-space: pre;
  margin: 0;
}
.code-label {
  font-family: var(--font-mono);
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ac);
  margin-bottom: 6px;
}

/* ── Viewer modal ───────────────────────────────────────────────────────── */
.viewer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.viewer-overlay.show { display: flex; }
.viewer-modal {
  background: var(--bg-raised);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 860px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  overflow: hidden;
}
.viewer-modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--panel-border);
  flex-shrink: 0;
}
.viewer-modal-head h3 { font-size: 1rem; color: var(--text); }
.viewer-modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.viewer-placeholder {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-faint);
}
.viewer-placeholder i { font-size: 2.4rem; display: block; margin-bottom: 14px; color: var(--info); }
.viewer-placeholder h4 { font-size: 1.05rem; color: var(--text); margin-bottom: 8px; }
.viewer-placeholder p { font-size: 0.88rem; }
.viewer-placeholder .file-path {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--info);
  background: var(--info-bg);
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  display: inline-block;
  margin-top: 12px;
}

/* ── Sticky unit jump bar ───────────────────────────────────────────────── */
.unit-jump-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 14px 16px;
  background: var(--bg-raised);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-md);
  margin-bottom: 28px;
  align-items: center;
}
.unit-jump-bar span {
  font-size: 0.75rem;
  color: var(--text-faint);
  font-family: var(--font-mono);
  margin-right: 4px;
}
.jump-btn {
  font-size: 0.78rem;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  background: none;
  cursor: pointer;
  transition: all 180ms ease;
  font-family: var(--font-body);
}
.jump-btn:hover { border-color: var(--ac); color: var(--ac); background: var(--ac-bg); }

/* ── Progress bar per unit ──────────────────────────────────────────────── */
.unit-progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.75rem;
  color: var(--text-faint);
  margin-left: auto;
}
.unit-progress-bar {
  width: 80px;
  height: 5px;
  background: var(--panel-border);
  border-radius: 3px;
  overflow: hidden;
}
.unit-progress-fill {
  height: 100%;
  background: var(--ac);
  border-radius: 3px;
  transition: width 500ms ease;
}

@media (max-width: 640px) {
  .example-row { grid-template-columns: 1fr; }
  .topic-resource-pills { display: none; }
  .unit-progress-row { display: none; }
  .viewer-modal { max-height: 95vh; }
}
</style>
</head>
<body>

<div id="topbarRoot" class="topbar"></div>
<div id="sidebarRoot" class="sidebar"></div>

<div class="main-content">
  <div class="page-container">

    <div class="page-header reveal">
      <div class="page-eyebrow">ls ./materials --unit-wise</div>
      <h1>Course Materials</h1>
      <p class="lede">All topics from the syllabus, organised unit-by-unit in order. Each topic includes Notes, PPT, Video, Code, and a worked Example. Click any topic to expand its resources.</p>
    </div>

    <!-- Unit jump bar -->
    <div class="unit-jump-bar reveal" id="unitJumpBar">
      <span>Jump to:</span>
    </div>

    <!-- Units container — filled by JS -->
    <div id="unitsContainer" class="reveal"></div>

  </div>

  <div id="footerRoot" class="site-footer"></div>
</div>

<!-- File viewer modal -->
<div class="viewer-overlay" id="viewerOverlay">
  <div class="viewer-modal">
    <div class="viewer-modal-head">
      <h3 id="viewerTitle">File Viewer</h3>
      <button class="icon-btn" id="viewerClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="viewer-modal-body" id="viewerBody"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/materials.js"></script>
</body>
</html>
